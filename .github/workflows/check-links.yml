name: Check Links

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check links with linkchecker
        run: |
          pip install linkchecker
          linkchecker pmp_quest.html --file-output=html/report.html --timeout=10
      
      - name: Upload report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: link-check-report
          path: report.html
      
      - name: Comment on results
        run: echo "✅ Link check complete. Check the artifacts for details."
